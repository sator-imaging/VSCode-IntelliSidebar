version: 2

multi-ecosystem-groups:
  default:
    commit-message:
      prefix: "deps"
    reviewers: [ "sator-imaging" ]
    labels: [ "dependabot" ]
    versioning-strategy: "auto"
    update-types:
      - "version-update:semver-minor"
      - "version-update:semver-patch"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Tokyo"
    cooldown:
      default-days: 7
      semver-major-days: 21
      semver-minor-days: 14
      semver-patch-days: 7
    open-pull-requests-limit: 10

updates:
  - package-ecosystem: "npm"
    multi-ecosystem-group: "default"
    directory: "/"
    patterns: ["*"]
  - package-ecosystem: "bun"
    multi-ecosystem-group: "default"
    directory: "/"
    patterns: ["*"]
  - package-ecosystem: "nuget"
    multi-ecosystem-group: "default"
    directory: "/"
    patterns: ["*"]
