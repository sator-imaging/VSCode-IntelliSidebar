changelog:
  categories:
    - title: ✨ Breaking Changes
      labels:
        - breaking-change
    - title: 🚀 Features
      labels:
        - enhancement
        - feature
    - title: 🧹 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📖 Documentation
      labels:
        - documentation
        - docs
    - title: 📚 Other Changes
      labels:
        - "*"
